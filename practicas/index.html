<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prácticas guiadas — Analítica de Big Data</title>
  <meta name="description" content="Laboratorios guiados con datos y código R/Python para Analítica de Big Data.">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#0f172a">
  <style>
    body { min-height: 100vh; }
    .embed-shell { max-width: 1120px; margin: 0 auto; padding: 1.25rem; }
    .embed-header { margin-bottom: 1.25rem; }
    .embed-header p { margin-top: 0.35rem; }
  </style>
</head>
<body>
  <main class="embed-shell">
    <div class="embed-header">
      <h1>Prácticas guiadas</h1>
      <p>Fichas paso a paso con datos descargables, código R data.table y enlace al laboratorio R/Python.</p>
    </div>
    <div id="practiceRoot"></div>
  </main>

  <script>
    const LABS = [
      {
        id: 'lab_datos',
        title: 'Laboratorio 1 - Del CSV al primer tablero',
        unit: 1,
        dataset: '../data/datasets/clientes_compras.csv',
        goal: 'Importar, limpiar y resumir compras de clientes para detectar segmentos simples.',
        steps: [
          ['Leer datos', 'Importar el archivo y revisar su estructura con data.table.', 'library(data.table)\nclientes <- fread("../data/datasets/clientes_compras.csv")\nstr(clientes)\nhead(clientes, 8)'],
          ['Resumir variables', 'Reconocer rangos, frecuencias y valores extremos.', 'clientes[, .(\n  edad_min = min(edad),\n  edad_max = max(edad),\n  compras_promedio = mean(compras_mes),\n  monto_promedio = mean(monto_total)\n)]\nclientes[, .N, by = canal_preferido]'],
          ['Crear una señal', 'Transformar datos transaccionales en información accionable.', 'clientes[, alto_valor := monto_total >= median(monto_total)]\nclientes[, .(monto_promedio = mean(monto_total)),\n         by = .(alto_valor, canal_preferido)]']
        ]
      },
      {
        id: 'lab_visualizacion',
        title: 'Laboratorio 2 - Exploración visual de estudiantes',
        unit: 2,
        dataset: '../data/datasets/estudiantes_ead.csv',
        goal: 'Explorar dedicación, participación y rendimiento en un curso virtual ficticio.',
        steps: [
          ['Distribuciones', 'Visualizar cómo se distribuyen las variables principales.', 'library(data.table)\nead <- fread("../data/datasets/estudiantes_ead.csv")\nhist(ead$horas_semana, col = "#14b8a6", main = "Horas de estudio", xlab = "Horas por semana")'],
          ['Relaciones', 'Observar asociaciones entre dedicación y calificación.', 'plot(ead$horas_semana, ead$nota_final, pch = 19, col = "#f97316")\nabline(lm(nota_final ~ horas_semana, data = ead), col = "#38bdf8", lwd = 2)'],
          ['Categorías', 'Binarizar variables para comparar grupos.', 'ead[, riesgo := fifelse(nota_final < 70 | entregas_pendientes > 1, "riesgo", "al_dia")]\nead[, .N, by = .(riesgo, turno)]']
        ]
      },
      {
        id: 'lab_modelos',
        title: 'Laboratorio 3 - Primer modelo predictivo',
        unit: 3,
        dataset: '../data/datasets/modelos_credito.csv',
        goal: 'Entrenar una regresión logística sencilla y leer sus probabilidades.',
        steps: [
          ['Variable objetivo', 'Definir qué se intenta predecir.', 'library(data.table)\ncredito <- fread("../data/datasets/modelos_credito.csv")\ncredito[, .N, by = aprobado]\ncredito[, .(proporcion = .N / nrow(credito)), by = aprobado]'],
          ['Entrenar modelo', 'Estimar probabilidades para un resultado binario.', 'modelo <- glm(aprobado ~ ingreso_mensual + score_credito + deuda_actual,\n              data = credito, family = binomial)\nsummary(modelo)'],
          ['Predicciones', 'Transformar probabilidades en decisiones con un umbral.', 'credito$prob_aprobacion <- predict(modelo, type = "response")\ncredito$prediccion <- ifelse(credito$prob_aprobacion >= 0.5, 1, 0)\ntable(Predicho = credito$prediccion, Real = credito$aprobado)']
        ]
      },
      {
        id: 'lab_interpretacion',
        title: 'Laboratorio 4 - Bitácora de interpretación',
        unit: 4,
        dataset: '../data/datasets/modelos_credito.csv',
        goal: 'Convertir resultados técnicos en una recomendación entendible.',
        steps: [
          ['Métricas mínimas', 'Comparar aciertos, errores y límites.', 'matriz <- table(Predicho = credito$prediccion, Real = credito$aprobado)\naccuracy <- sum(diag(matriz)) / sum(matriz)\naccuracy'],
          ['Casos dudosos', 'Revisar observaciones cercanas al umbral.', 'credito[order(abs(prob_aprobacion - 0.5))][1:5,\n  .(id, ingreso_mensual, score_credito, deuda_actual, prob_aprobacion)]'],
          ['Cierre comunicable', 'Explicar datos, método, resultado, límites y acción.', 'cat("Recomendación: usar el modelo como apoyo, no como decisión automática.\\n")\ncat("Validar con nuevos datos antes de aplicar en producción.\\n")']
        ]
      }
    ];

    let lab = LABS.find(item => `#${item.id}` === location.hash) || LABS[0];
    let step = 0;

    function escapeHtml(value) {
      return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function render() {
      const current = lab.steps[step];
      document.getElementById('practiceRoot').innerHTML = `
        <div class="practice-grid" style="margin-bottom:1rem">
          ${LABS.map(item => `
            <button class="practice-card" style="text-align:left;cursor:pointer" onclick="selectLab('${item.id}')">
              <span class="material-badge badge-act">Unidad ${item.unit}</span>
              <h3 style="margin-top:.7rem">${item.title}</h3>
              <p>${item.goal}</p>
            </button>`).join('')}
        </div>
        <div class="practice-shell">
          <div class="unit-detail-header">
            <div>
              <h2>${lab.title}</h2>
              <p>${lab.goal}</p>
            </div>
            <div class="practice-actions">
              <a class="btn-secondary as-link" href="${lab.dataset}" download>Descargar CSV</a>
              <a class="btn-primary as-link" href="../laboratorio/index.html" target="_blank">Abrir laboratorio R/Python</a>
            </div>
          </div>
          <div class="practice-stepper">
            ${lab.steps.map((_, i) => `<button class="step-dot ${i === step ? 'active' : ''}" onclick="step=${i};render()">${i + 1}</button>`).join('')}
          </div>
          <div class="practice-detail">
            <div class="practice-main">
              <span class="material-badge badge-quiz">Ficha ${step + 1} de ${lab.steps.length}</span>
              <h3>${current[0]}</h3>
              <div class="concept-box">${current[1]}</div>
              <pre class="code-block"><code>${escapeHtml(current[2])}</code></pre>
              <div class="practice-actions">
                <button class="btn-secondary" onclick="navigator.clipboard?.writeText(${JSON.stringify(current[2])})">Copiar código</button>
                <button class="btn-secondary" onclick="step=Math.max(0,step-1);render()" ${step === 0 ? 'disabled' : ''}>Anterior</button>
                <button class="btn-primary" onclick="step=Math.min(lab.steps.length-1,step+1);render()" ${step === lab.steps.length - 1 ? 'disabled' : ''}>Siguiente</button>
              </div>
            </div>
            <aside class="practice-task">
              <h4>Producto de la ficha</h4>
              <p>Ejecuta el código, interpreta la salida y registra tu respuesta en la plataforma principal.</p>
              <a class="btn-primary as-link" href="../dashboard.html">Ir al aula</a>
            </aside>
          </div>
        </div>`;
    }

    function selectLab(id) {
      lab = LABS.find(item => item.id === id) || LABS[0];
      step = 0;
      history.replaceState(null, '', `#${lab.id}`);
      render();
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../sw.js').catch(() => {});
    }

    render();
  </script>
</body>
</html>
