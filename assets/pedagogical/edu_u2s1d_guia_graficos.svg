<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg21d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#bg21d)"/>

  <!-- Header -->
  <rect width="900" height="50" fill="#78350f"/>
  <text x="450" y="29" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="white">¿Qué gráfico usar? Guía de selección visual</text>
  <text x="450" y="44" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" fill="#fcd34d">Unidad 2.1 · Grammar of Graphics · Visualización de Datos · FACEN-UNA 2026</text>

  <!-- LEFT PANEL: 5 categorías -->
  <rect x="18" y="58" width="430" height="410" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>
  <text x="233" y="77" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="800" fill="#78350f">Elige el gráfico según tu objetivo</text>
  <text x="233" y="91" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" fill="#6b7280">Elige según qué quieres comunicar, no según lo que "se ve bonito"</text>

  <!-- ROW 1: Distribución (purple) y=98 h=62 -->
  <rect x="24" y="98" width="418" height="62" rx="5" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <rect x="24" y="98" width="5" height="62" fill="#7c3aed" rx="2"/>
  <text x="37" y="114" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#7c3aed">1. DISTRIBUCIÓN — ¿cómo se reparten los valores?</text>
  <text x="37" y="127" font-family="Inter,Arial,sans-serif" font-size="10" fill="#374151">Una variable cuantitativa continua. Detectar sesgo, outliers y forma.</text>
  <text x="37" y="140" font-family="Inter,Arial,sans-serif" font-size="10" fill="#4b5563">→ <tspan fill="#7c3aed" font-weight="600">histograma · densidad · boxplot · violin · Q-Q plot</tspan></text>
  <!-- mini histogram -->
  <rect x="336" y="120" width="9" height="20" fill="#7c3aed" opacity="0.45"/>
  <rect x="348" y="113" width="9" height="27" fill="#7c3aed" opacity="0.65"/>
  <rect x="360" y="106" width="9" height="34" fill="#7c3aed" opacity="0.9"/>
  <rect x="372" y="110" width="9" height="30" fill="#7c3aed" opacity="0.75"/>
  <rect x="384" y="117" width="9" height="23" fill="#7c3aed" opacity="0.5"/>
  <rect x="396" y="126" width="9" height="14" fill="#7c3aed" opacity="0.3"/>
  <line x1="334" y1="140" x2="408" y2="140" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>

  <!-- ROW 2: Comparación (blue) y=165 h=62 -->
  <rect x="24" y="165" width="418" height="62" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <rect x="24" y="165" width="5" height="62" fill="#1d4ed8" rx="2"/>
  <text x="37" y="181" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#1d4ed8">2. COMPARACIÓN — ¿qué grupo es mayor/menor?</text>
  <text x="37" y="194" font-family="Inter,Arial,sans-serif" font-size="10" fill="#374151">Comparar magnitudes entre categorías. Preferir barras horizontales.</text>
  <text x="37" y="207" font-family="Inter,Arial,sans-serif" font-size="10" fill="#4b5563">→ <tspan fill="#1d4ed8" font-weight="600">barras horizontales · lollipop · cleveland dot · boxplot múltiple</tspan></text>
  <!-- mini horizontal bars -->
  <rect x="334" y="172" width="52" height="9" fill="#1d4ed8" opacity="0.5"/>
  <rect x="334" y="184" width="72" height="9" fill="#1d4ed8" opacity="0.8"/>
  <rect x="334" y="196" width="42" height="9" fill="#1d4ed8" opacity="0.6"/>
  <rect x="334" y="208" width="28" height="9" fill="#1d4ed8" opacity="0.35"/>
  <line x1="334" y1="171" x2="334" y2="219" stroke="#1d4ed8" stroke-width="1" opacity="0.6"/>

  <!-- ROW 3: Relación (green) y=232 h=62 -->
  <rect x="24" y="232" width="418" height="62" rx="5" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <rect x="24" y="232" width="5" height="62" fill="#059669" rx="2"/>
  <text x="37" y="248" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#059669">3. RELACIÓN — ¿existe correlación entre variables?</text>
  <text x="37" y="261" font-family="Inter,Arial,sans-serif" font-size="10" fill="#374151">Dos o más variables cuantitativas. Detectar patrones y tendencias.</text>
  <text x="37" y="274" font-family="Inter,Arial,sans-serif" font-size="10" fill="#4b5563">→ <tspan fill="#059669" font-weight="600">dispersión · línea + puntos · heatmap · burbuja</tspan></text>
  <!-- mini scatter -->
  <circle cx="346" cy="258" r="3" fill="#059669" opacity="0.7"/>
  <circle cx="357" cy="250" r="3" fill="#059669" opacity="0.7"/>
  <circle cx="368" cy="265" r="3" fill="#059669" opacity="0.7"/>
  <circle cx="379" cy="245" r="3" fill="#059669" opacity="0.7"/>
  <circle cx="390" cy="255" r="3" fill="#059669" opacity="0.7"/>
  <circle cx="401" cy="241" r="3" fill="#059669" opacity="0.7"/>
  <line x1="342" y1="270" x2="406" y2="238" stroke="#059669" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="342" y1="271" x2="406" y2="271" stroke="#059669" stroke-width="0.8" opacity="0.4"/>
  <line x1="342" y1="237" x2="342" y2="271" stroke="#059669" stroke-width="0.8" opacity="0.4"/>

  <!-- ROW 4: Composición (amber) y=299 h=62 -->
  <rect x="24" y="299" width="418" height="62" rx="5" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <rect x="24" y="299" width="5" height="62" fill="#b45309" rx="2"/>
  <text x="37" y="315" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#b45309">4. COMPOSICIÓN — ¿qué parte representa cada grupo?</text>
  <text x="37" y="328" font-family="Inter,Arial,sans-serif" font-size="10" fill="#374151">Partes de un todo. Evitar pie chart si hay más de 5 categorías.</text>
  <text x="37" y="341" font-family="Inter,Arial,sans-serif" font-size="10" fill="#4b5563">→ <tspan fill="#b45309" font-weight="600">barras apiladas · treemap · waffle · pie (≤ 5 cat.)</tspan></text>
  <!-- mini stacked bars -->
  <rect x="340" y="307" width="16" height="9"  fill="#b45309" opacity="0.9"/>
  <rect x="340" y="316" width="16" height="14" fill="#b45309" opacity="0.6"/>
  <rect x="340" y="330" width="16" height="5"  fill="#b45309" opacity="0.3"/>
  <rect x="360" y="308" width="16" height="6"  fill="#b45309" opacity="0.9"/>
  <rect x="360" y="314" width="16" height="18" fill="#b45309" opacity="0.6"/>
  <rect x="360" y="332" width="16" height="4"  fill="#b45309" opacity="0.3"/>
  <rect x="380" y="305" width="16" height="11" fill="#b45309" opacity="0.9"/>
  <rect x="380" y="316" width="16" height="10" fill="#b45309" opacity="0.6"/>
  <rect x="380" y="326" width="16" height="9"  fill="#b45309" opacity="0.3"/>
  <rect x="400" y="309" width="16" height="13" fill="#b45309" opacity="0.9"/>
  <rect x="400" y="322" width="16" height="9"  fill="#b45309" opacity="0.6"/>
  <rect x="400" y="331" width="16" height="5"  fill="#b45309" opacity="0.3"/>

  <!-- ROW 5: Tendencia (teal) y=366 h=62 -->
  <rect x="24" y="366" width="418" height="62" rx="5" fill="#ecfeff" stroke="#a5f3fc" stroke-width="1"/>
  <rect x="24" y="366" width="5" height="62" fill="#0e7490" rx="2"/>
  <text x="37" y="382" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#0e7490">5. TENDENCIA — ¿cómo cambia algo a lo largo del tiempo?</text>
  <text x="37" y="395" font-family="Inter,Arial,sans-serif" font-size="10" fill="#374151">Variable a lo largo de una serie temporal o secuencia ordenada.</text>
  <text x="37" y="408" font-family="Inter,Arial,sans-serif" font-size="10" fill="#4b5563">→ <tspan fill="#0e7490" font-weight="600">línea de tiempo · área · barras temporales · heatmap temporal</tspan></text>
  <!-- mini line chart -->
  <polyline points="338,409 350,402 362,397 374,390 386,394 398,385 410,378"
    fill="none" stroke="#0e7490" stroke-width="2.2" stroke-linejoin="round"/>
  <circle cx="338" cy="409" r="2.5" fill="#0e7490"/>
  <circle cx="350" cy="402" r="2.5" fill="#0e7490"/>
  <circle cx="362" cy="397" r="2.5" fill="#0e7490"/>
  <circle cx="374" cy="390" r="2.5" fill="#0e7490"/>
  <circle cx="386" cy="394" r="2.5" fill="#0e7490"/>
  <circle cx="398" cy="385" r="2.5" fill="#0e7490"/>
  <circle cx="410" cy="378" r="2.5" fill="#0e7490"/>
  <line x1="336" y1="412" x2="413" y2="412" stroke="#0e7490" stroke-width="0.8" opacity="0.5"/>

  <!-- Bottom warning note -->
  <rect x="24" y="434" width="418" height="24" rx="4" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <text x="233" y="450" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9.5" fill="#92400e">⚠ Evitar: gráfico 3D · pie con muchas categorías · doble eje Y sin justificación · escala truncada</text>

  <!-- RIGHT PANEL: código + reglas -->
  <rect x="462" y="58" width="424" height="410" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>
  <text x="674" y="77" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="800" fill="#78350f">Implementación: ggplot2 (R) y seaborn (Python)</text>
  <text x="674" y="90" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" fill="#6b7280">Sintaxis mínima · usar datos propios de Paraguay</text>

  <!-- Code block 1: Distribución -->
  <rect x="469" y="96"  width="410" height="64" rx="5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="469" y="96"  width="410" height="16" rx="5" fill="#1e0a3c"/>
  <rect x="469" y="106" width="410" height="6" fill="#1e0a3c"/>
  <text x="475" y="108" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="700" fill="#c084fc">Distribución</text>
  <text x="475" y="124" font-family="Courier New,monospace" font-size="10" fill="#f8f8f2">
    <tspan fill="#fbbf24">ggplot</tspan>(df, <tspan fill="#fbbf24">aes</tspan>(x=ingreso)) + <tspan fill="#5eead4">geom_histogram</tspan>(bins=<tspan fill="#fb923c">30</tspan>, fill=<tspan fill="#86efac">"#7c3aed"</tspan>)
  </text>
  <text x="475" y="138" font-family="Courier New,monospace" font-size="10" fill="#f8f8f2">
    <tspan fill="#93c5fd">sns</tspan>.<tspan fill="#5eead4">histplot</tspan>(df[<tspan fill="#86efac">"ingreso"</tspan>], kde=<tspan fill="#fbbf24">True</tspan>, bins=<tspan fill="#fb923c">30</tspan>)
  </text>
  <text x="475" y="152" font-family="Courier New,monospace" font-size="10" fill="#6b7280">
    <tspan># También: geom_boxplot() · geom_density() · sns.boxplot()</tspan>
  </text>

  <!-- Code block 2: Comparación -->
  <rect x="469" y="165" width="410" height="64" rx="5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="469" y="165" width="410" height="16" rx="5" fill="#0a1929"/>
  <rect x="469" y="175" width="410" height="6" fill="#0a1929"/>
  <text x="475" y="177" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="700" fill="#93c5fd">Comparación</text>
  <text x="475" y="193" font-family="Courier New,monospace" font-size="10" fill="#f8f8f2">
    <tspan fill="#fbbf24">ggplot</tspan>(df, <tspan fill="#fbbf24">aes</tspan>(x=<tspan fill="#5eead4">reorder</tspan>(depto,n), y=n)) + <tspan fill="#5eead4">geom_col</tspan>() + <tspan fill="#5eead4">coord_flip</tspan>()
  </text>
  <text x="475" y="207" font-family="Courier New,monospace" font-size="10" fill="#f8f8f2">
    <tspan fill="#93c5fd">sns</tspan>.<tspan fill="#5eead4">barplot</tspan>(data=df, y=<tspan fill="#86efac">"depto"</tspan>, x=<tspan fill="#86efac">"n"</tspan>, orient=<tspan fill="#86efac">"h"</tspan>)
  </text>
  <text x="475" y="221" font-family="Courier New,monospace" font-size="10" fill="#6b7280">
    <tspan># Tip: reorder() ordena de mayor a menor automáticamente</tspan>
  </text>

  <!-- Code block 3: Relación -->
  <rect x="469" y="234" width="410" height="64" rx="5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="469" y="234" width="410" height="16" rx="5" fill="#0a1a12"/>
  <rect x="469" y="244" width="410" height="6" fill="#0a1a12"/>
  <text x="475" y="246" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="700" fill="#6ee7b7">Relación / Correlación</text>
  <text x="475" y="262" font-family="Courier New,monospace" font-size="10" fill="#f8f8f2">
    <tspan fill="#fbbf24">ggplot</tspan>(df, <tspan fill="#fbbf24">aes</tspan>(x=edad, y=ingreso, color=zona)) + <tspan fill="#5eead4">geom_point</tspan>(alpha=<tspan fill="#fb923c">.6</tspan>)
  </text>
  <text x="475" y="276" font-family="Courier New,monospace" font-size="10" fill="#f8f8f2">
    <tspan fill="#93c5fd">sns</tspan>.<tspan fill="#5eead4">scatterplot</tspan>(data=df, x=<tspan fill="#86efac">"edad"</tspan>, y=<tspan fill="#86efac">"ingreso"</tspan>, hue=<tspan fill="#86efac">"zona"</tspan>)
  </text>
  <text x="475" y="290" font-family="Courier New,monospace" font-size="10" fill="#6b7280">
    <tspan># Agrega + geom_smooth(method="lm") para línea de tendencia</tspan>
  </text>

  <!-- Code block 4: Tendencia temporal -->
  <rect x="469" y="303" width="410" height="64" rx="5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="469" y="303" width="410" height="16" rx="5" fill="#071a20"/>
  <rect x="469" y="313" width="410" height="6" fill="#071a20"/>
  <text x="475" y="315" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="700" fill="#7dd3fc">Tendencia temporal</text>
  <text x="475" y="331" font-family="Courier New,monospace" font-size="10" fill="#f8f8f2">
    <tspan fill="#fbbf24">ggplot</tspan>(df, <tspan fill="#fbbf24">aes</tspan>(x=año, y=val, color=depto)) + <tspan fill="#5eead4">geom_line</tspan>() + <tspan fill="#5eead4">geom_point</tspan>()
  </text>
  <text x="475" y="345" font-family="Courier New,monospace" font-size="10" fill="#f8f8f2">
    <tspan fill="#93c5fd">sns</tspan>.<tspan fill="#5eead4">lineplot</tspan>(data=df, x=<tspan fill="#86efac">"año"</tspan>, y=<tspan fill="#86efac">"val"</tspan>, hue=<tspan fill="#86efac">"depto"</tspan>)
  </text>
  <text x="475" y="359" font-family="Courier New,monospace" font-size="10" fill="#6b7280">
    <tspan># Máx. 7 líneas por gráfico — más líneas = heatmap temporal</tspan>
  </text>

  <!-- Reglas de oro box -->
  <rect x="469" y="373" width="410" height="85" rx="6" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <text x="674" y="388" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#78350f">Reglas de oro de la visualización</text>
  <text x="475" y="402" font-family="Inter,Arial,sans-serif" font-size="9.5" fill="#374151">• <tspan font-weight="700" fill="#b45309">Eje Y desde cero</tspan> en barras · <tspan font-weight="700" fill="#dc2626">nunca truncar</tspan> para exagerar diferencias</text>
  <text x="475" y="415" font-family="Inter,Arial,sans-serif" font-size="9.5" fill="#374151">• <tspan font-weight="700" fill="#b45309">Etiquetas siempre:</tspan> título, ejes con unidades (Gs., km², años)</text>
  <text x="475" y="428" font-family="Inter,Arial,sans-serif" font-size="9.5" fill="#374151">• <tspan font-weight="700" fill="#b45309">Paleta accesible:</tspan> <tspan fill="#7c3aed">viridis</tspan> / <tspan fill="#059669">ColorBrewer</tspan> — evitar rojo+verde (daltonismo)</text>
  <text x="475" y="441" font-family="Inter,Arial,sans-serif" font-size="9.5" fill="#374151">• <tspan font-weight="700" fill="#b45309">theme_minimal()</tspan> en R · <tspan font-weight="700" fill="#b45309">sns.set_style("whitegrid")</tspan> en Python</text>
  <text x="475" y="454" font-family="Inter,Arial,sans-serif" font-size="9.5" fill="#374151">• <tspan font-weight="700" fill="#b45309">Un gráfico = un mensaje</tspan> claro · el lector no debe adivinar nada</text>
</svg>
