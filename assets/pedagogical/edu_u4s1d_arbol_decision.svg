  <line x1="338" y1="130" x2="420" y2="175" stroke="#374151" stroke-width="1.5"/>
  <text x="398" y="160" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#dc2626">Sí</text>

