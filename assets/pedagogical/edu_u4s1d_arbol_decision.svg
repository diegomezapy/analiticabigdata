  <rect x="344" y="175" width="152" height="42" rx="6" fill="#7f1d1d" stroke="#dc2626" stroke-width="1.5"/>
  <text x="420" y="192" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10.5" font-weight="700" fill="white">hipertensión = Sí?</text>
  <text x="420" y="206" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9" fill="#fca5a5">Gini=0.41 · n=160</text>

