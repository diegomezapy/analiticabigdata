  <rect x="68" y="175" width="154" height="42" rx="6" fill="#14532d" stroke="#16a34a" stroke-width="1.5"/>
  <text x="145" y="192" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10.5" font-weight="700" fill="white">IMC &gt; 30?</text>
  <text x="145" y="206" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9" fill="#86efac">Gini=0.38 · n=240</text>
  <!-- Depth label -->
  <text x="30" y="200" font-family="Inter,Arial,sans-serif" font-size="8.5" fill="#6b7280">prof. 1</text>

