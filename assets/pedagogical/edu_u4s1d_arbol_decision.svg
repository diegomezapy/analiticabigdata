  <!-- LEFT: Tree diagram -->
  <rect x="18" y="58" width="520" height="410" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>
  <text x="278" y="78" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="800" fill="#052e16">Árbol: Predicción de Riesgo Cardíaco</text>

  <!-- ROOT NODE (depth=0) cx=278, y=102 -->
  <rect x="178" y="88" width="200" height="42" rx="8" fill="#1e3a5f" stroke="#1d4ed8" stroke-width="2"/>
  <text x="278" y="105" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="white">glucosa &gt; 126?</text>
  <text x="278" y="119" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9" fill="#93c5fd">Nodo raíz · Gini=0.47 · n=400</text>
