  <text x="478" y="163" font-family="'Courier New',monospace" font-size="11.5"><tspan fill="#61afef">modelo</tspan><tspan fill="#6b7280">  glm  </tspan><tspan fill="#98c379">Logistic, binomial</tspan></text>
