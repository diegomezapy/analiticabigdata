  <text x="478" y="125" font-family="'Courier New',monospace" font-size="11.5"><tspan fill="#61afef">datos</tspan><tspan fill="#6b7280">  data.table, data.frame</tspan></text>
  <text x="865" y="125" text-anchor="end" font-family="'Courier New',monospace" font-size="11.5" fill="#a78bfa">12450 × 8</tspan>
