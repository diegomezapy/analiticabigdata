  <text x="36" y="431" font-family="'Courier New',monospace" font-size="10" fill="#abb2bf">1:  1    34 27.4 Central  Ñemby    Hipertensión</text>
  <text x="36" y="445" font-family="'Courier New',monospace" font-size="10" fill="#abb2bf">2:  2    52 31.8 Alto Pná Encarn.  Diabetes T2</text>
  <text x="36" y="459" font-family="'Courier New',monospace" font-size="10" fill="#abb2bf">3:  3    28 22.1 Central  Asunción Normal</text>
  <text x="36" y="476" font-family="'Courier New',monospace" font-size="11"><tspan fill="#61afef">&gt; </tspan><tspan fill="#e5c07b">█</tspan></text>

