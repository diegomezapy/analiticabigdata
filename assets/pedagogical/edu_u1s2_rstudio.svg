  <text x="18" y="331" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#34d399">⬥ Console</text>
  <text x="36" y="356" font-family="'Courier New',monospace" font-size="11" fill="#6b7280">R version 4.4.1 (2024) — "Race for Your Life"</text>
  <text x="36" y="372" font-family="'Courier New',monospace" font-size="11"><tspan fill="#61afef">&gt; </tspan><tspan fill="#abb2bf">datos &lt;- fread("salud_py.csv")</tspan></text>
  <text x="36" y="387" font-family="'Courier New',monospace" font-size="11" fill="#98c379">Read 12,450 rows in 0.08s (data.table)</text>
  <text x="36" y="402" font-family="'Courier New',monospace" font-size="11"><tspan fill="#61afef">&gt; </tspan><tspan fill="#abb2bf">head(datos, 3)</tspan></text>
