<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560">
  <rect width="900" height="560" fill="#1a1a2e"/>
  <!-- Header -->
  <rect width="900" height="46" fill="#1e3a5f"/>
  <text x="450" y="27" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="800" fill="white">Entorno RStudio — Interfaz de Trabajo</text>
  <text x="450" y="41" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" fill="#7dd3fc">Unidad 1.2 · Los 4 paneles del IDE para Analítica de Big Data</text>

  <!-- Toolbar simulation -->
  <rect x="0" y="46" width="900" height="28" fill="#2d3748"/>
  <text x="20" y="65" font-family="Inter,Arial,sans-serif" font-size="12" fill="#a0aec0">File  Edit  Code  View  Plots  Session  Build  Debug  Profile  Tools  Help</text>

  <!-- PANE 1: Script Editor (top-left) -->
  <rect x="8" y="80" width="444" height="228" rx="4" fill="#1e1e2e" stroke="#374151" stroke-width="1"/>
  <rect x="8" y="80" width="444" height="24" rx="4" fill="#2d3748"/>
  <text x="18" y="97" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#60a5fa">📄 salud_paraguay.R</text>
  <text x="440" y="97" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="10" fill="#6b7280">Source  ▶ Run</text>
  <!-- Line numbers + code -->
  <text x="20" y="120" font-family="'Courier New',monospace" font-size="11" fill="#4b5563">1</text>
  <text x="36" y="120" font-family="'Courier New',monospace" font-size="11" fill="#6b7280"># Cargar librerías de Big Data</text>
  <text x="20" y="135" font-family="'Courier New',monospace" font-size="11" fill="#4b5563">2</text>
  <text x="36" y="135" font-family="'Courier New',monospace" font-size="11"><tspan fill="#c678dd">library</tspan><tspan fill="#abb2bf">(</tspan><tspan fill="#e5c07b">data.table</tspan><tspan fill="#abb2bf">)</tspan></text>
  <text x="20" y="150" font-family="'Courier New',monospace" font-size="11" fill="#4b5563">3</text>
  <text x="36" y="150" font-family="'Courier New',monospace" font-size="11"><tspan fill="#c678dd">library</tspan><tspan fill="#abb2bf">(</tspan><tspan fill="#e5c07b">ggplot2</tspan><tspan fill="#abb2bf">)</tspan></text>
  <text x="20" y="165" font-family="'Courier New',monospace" font-size="11" fill="#4b5563">4</text>
  <text x="36" y="165" font-family="'Courier New',monospace" font-size="11" fill="#4b5563"> </text>
  <text x="20" y="180" font-family="'Courier New',monospace" font-size="11" fill="#4b5563">5</text>
  <text x="36" y="180" font-family="'Courier New',monospace" font-size="11"><tspan fill="#61afef">datos</tspan><tspan fill="#abb2bf"> &lt;- </tspan><tspan fill="#c678dd">fread</tspan><tspan fill="#abb2bf">(</tspan><tspan fill="#98c379">"salud_py.csv"</tspan><tspan fill="#abb2bf">)</tspan></text>
  <text x="20" y="195" font-family="'Courier New',monospace" font-size="11" fill="#4b5563">6</text>
  <text x="36" y="195" font-family="'Courier New',monospace" font-size="11"><tspan fill="#c678dd">head</tspan><tspan fill="#abb2bf">(datos, </tspan><tspan fill="#d19a66">3</tspan><tspan fill="#abb2bf">)</tspan></text>
  <text x="20" y="210" font-family="'Courier New',monospace" font-size="11" fill="#4b5563">7</text>
  <text x="36" y="210" font-family="'Courier New',monospace" font-size="11" fill="#4b5563"> </text>
  <text x="20" y="225" font-family="'Courier New',monospace" font-size="11" fill="#4b5563">8</text>
  <text x="36" y="225" font-family="'Courier New',monospace" font-size="11"><tspan fill="#c678dd">ggplot</tspan><tspan fill="#abb2bf">(datos, </tspan><tspan fill="#c678dd">aes</tspan><tspan fill="#abb2bf">(x=edad, y=IMC)) +</tspan></text>
  <text x="20" y="240" font-family="'Courier New',monospace" font-size="11" fill="#4b5563">9</text>
  <text x="36" y="240" font-family="'Courier New',monospace" font-size="11"><tspan fill="#abb2bf">  </tspan><tspan fill="#c678dd">geom_point</tspan><tspan fill="#abb2bf">(alpha=</tspan><tspan fill="#d19a66">0.6</tspan><tspan fill="#abb2bf">) +</tspan></text>
  <text x="20" y="255" font-family="'Courier New',monospace" font-size="11" fill="#4b5563">10</text>
  <text x="36" y="255" font-family="'Courier New',monospace" font-size="11"><tspan fill="#abb2bf">  </tspan><tspan fill="#c678dd">geom_smooth</tspan><tspan fill="#abb2bf">(method=</tspan><tspan fill="#98c379">"lm"</tspan><tspan fill="#abb2bf">)</tspan></text>
  <rect x="8" y="302" width="444" height="6" rx="2" fill="#374151" opacity="0.5"/>
  <!-- Cursor blinking line indicator -->
  <rect x="36" y="258" width="6" height="12" fill="#61afef" opacity="0.8"/>

  <!-- PANE 2: Console (bottom-left) -->
