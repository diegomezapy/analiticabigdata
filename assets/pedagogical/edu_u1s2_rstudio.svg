  <text x="710" y="189" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="600" fill="#9ca3af">Valores</text>
  <text x="478" y="206" font-family="'Courier New',monospace" font-size="10.5"><tspan fill="#61afef">edad</tspan>        <tspan fill="#a78bfa">int</tspan>    <tspan fill="#abb2bf">18 – 95</tspan></text>
  <text x="478" y="221" font-family="'Courier New',monospace" font-size="10.5"><tspan fill="#61afef">IMC</tspan>         <tspan fill="#a78bfa">num</tspan>    <tspan fill="#abb2bf">14.2 – 52.8</tspan></text>
  <text x="478" y="236" font-family="'Courier New',monospace" font-size="10.5"><tspan fill="#61afef">diagnostico</tspan> <tspan fill="#a78bfa">chr</tspan>    <tspan fill="#98c379">"Normal", "Diab.", …</tspan></text>
  <text x="478" y="251" font-family="'Courier New',monospace" font-size="10.5"><tspan fill="#61afef">region</tspan>      <tspan fill="#a78bfa">chr</tspan>    <tspan fill="#98c379">"Central", "PY", …</tspan></text>
  <text x="478" y="266" font-family="'Courier New',monospace" font-size="10.5"><tspan fill="#61afef">sexo</tspan>        <tspan fill="#a78bfa">factor</tspan> <tspan fill="#98c379">"M", "F"</tspan></text>
  <text x="478" y="281" font-family="'Courier New',monospace" font-size="10.5"><tspan fill="#61afef">tension</tspan>     <tspan fill="#a78bfa">num</tspan>    <tspan fill="#abb2bf">90 – 180</tspan></text>
  <text x="478" y="296" font-family="'Courier New',monospace" font-size="10.5"><tspan fill="#61afef">glucosa</tspan>     <tspan fill="#a78bfa">num</tspan>    <tspan fill="#abb2bf">70 – 320</tspan></text>

