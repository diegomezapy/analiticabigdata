  <!-- YAML header -->
  <rect x="26" y="98" width="204" height="58" rx="4" fill="#2d3748"/>
  <text x="34" y="112" font-family="'Courier New',monospace" font-size="9.5" fill="#e5c07b">---</text>
  <text x="34" y="126" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#61afef">title:</tspan><tspan fill="#98c379"> "Análisis MSPBS 2025"</tspan></text>
  <text x="34" y="140" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#61afef">output:</tspan><tspan fill="#abb2bf"> html_document</tspan></text>
  <text x="34" y="154" font-family="'Courier New',monospace" font-size="9.5" fill="#e5c07b">---</text>

  <!-- Markdown content -->
  <text x="34" y="172" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#a78bfa">## Resultados</tspan></text>
  <text x="34" y="186" font-family="'Courier New',monospace" font-size="9.5" fill="#abb2bf">Se analizaron **12,450**</text>
  <text x="34" y="200" font-family="'Courier New',monospace" font-size="9.5" fill="#abb2bf">pacientes del MSPBS.</text>

  <!-- Code chunk -->
  <rect x="26" y="208" width="204" height="64" rx="4" fill="#2d3748"/>
  <text x="34" y="222" font-family="'Courier New',monospace" font-size="9.5" fill="#6b7280">```{r}</text>
  <text x="34" y="236" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#c678dd">ggplot</tspan><tspan fill="#abb2bf">(datos, </tspan></text>
  <text x="34" y="250" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#abb2bf">  aes(x=edad)) +</tspan></text>
  <text x="34" y="264" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#c678dd">  geom_hist</tspan><tspan fill="#abb2bf">(...)</tspan></text>
  <text x="34" y="278" font-family="'Courier New',monospace" font-size="9.5" fill="#6b7280">```</text>

  <!-- More text -->
  <text x="34" y="296" font-family="'Courier New',monospace" font-size="9.5" fill="#abb2bf">La mediana de edad es</text>
  <text x="34" y="310" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#98c379">`r median(d$edad)`</tspan><tspan fill="#abb2bf"> años.</tspan></text>
  <text x="34" y="326" font-family="'Courier New',monospace" font-size="9.5" fill="#abb2bf">Ver @fig-histograma.</text>
  <text x="34" y="344" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#a78bfa">## Conclusiones</tspan></text>
  <text x="34" y="358" font-family="'Courier New',monospace" font-size="9.5" fill="#abb2bf">Factores más relevantes:</text>
  <text x="34" y="372" font-family="'Courier New',monospace" font-size="9.5" fill="#abb2bf">glucosa, edad e IMC.</text>

