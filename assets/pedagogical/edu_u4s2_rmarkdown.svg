  <text x="454" y="426" font-family="Inter,Arial,sans-serif" font-size="10" fill="#374151">Sliders · selectInput · plotOutput</text>
  <text x="454" y="442" font-family="Inter,Arial,sans-serif" font-size="10" fill="#6b7280">deploy en shinyapps.io</text>

  <!-- Right panel: Shiny code example -->
  <rect x="668" y="62" width="218" height="396" rx="8" fill="#1e1e2e" stroke="#7c3aed" stroke-width="2"/>
  <rect x="668" y="62" width="218" height="28" rx="8" fill="#7c3aed"/>
  <text x="777" y="80" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="white">⚡ app.R — Shiny</text>
  <text x="678" y="110" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#c678dd">library</tspan><tspan fill="#abb2bf">(shiny)</tspan></text>
  <text x="678" y="125" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#c678dd">library</tspan><tspan fill="#abb2bf">(ggplot2)</tspan></text>
  <text x="678" y="142" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#61afef">ui</tspan><tspan fill="#abb2bf"> &lt;- </tspan><tspan fill="#c678dd">fluidPage</tspan><tspan fill="#abb2bf">(</tspan></text>
  <text x="678" y="156" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#c678dd">  titlePanel</tspan><tspan fill="#abb2bf">(</tspan></text>
  <text x="678" y="170" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#98c379">    "Dashboard MSPBS"</tspan><tspan fill="#abb2bf">),</tspan></text>
  <text x="678" y="184" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#c678dd">  sliderInput</tspan><tspan fill="#abb2bf">(</tspan></text>
  <text x="678" y="198" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#98c379">    "edad_min"</tspan><tspan fill="#abb2bf">,</tspan></text>
  <text x="678" y="212" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#abb2bf">    min=</tspan><tspan fill="#d19a66">18</tspan><tspan fill="#abb2bf">, max=</tspan><tspan fill="#d19a66">90</tspan><tspan fill="#abb2bf">),</tspan></text>
  <text x="678" y="226" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#c678dd">  plotOutput</tspan><tspan fill="#abb2bf">(</tspan><tspan fill="#98c379">"grafico"</tspan><tspan fill="#abb2bf">)</tspan></text>
  <text x="678" y="240" font-family="'Courier New',monospace" font-size="9.5" fill="#abb2bf">)</text>
  <text x="678" y="258" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#61afef">server</tspan><tspan fill="#abb2bf"> &lt;- </tspan><tspan fill="#c678dd">function</tspan><tspan fill="#abb2bf">(i,o,s)\{</tspan></text>
  <text x="678" y="272" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#61afef">  o$grafico</tspan><tspan fill="#abb2bf"> &lt;- </tspan><tspan fill="#c678dd">renderPlot</tspan><tspan fill="#abb2bf">(\{</tspan></text>
  <text x="678" y="286" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#abb2bf">    d |&gt; </tspan><tspan fill="#c678dd">filter</tspan><tspan fill="#abb2bf">(</tspan></text>
  <text x="678" y="300" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#abb2bf">      edad &gt;= </tspan><tspan fill="#c678dd">input$</tspan><tspan fill="#61afef">edad_min</tspan></text>
  <text x="678" y="314" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#abb2bf">    ) |&gt; </tspan><tspan fill="#c678dd">ggplot</tspan><tspan fill="#abb2bf">(</tspan></text>
  <text x="678" y="328" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#c678dd">      aes</tspan><tspan fill="#abb2bf">(x=IMC)) +</tspan></text>
  <text x="678" y="342" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#c678dd">      geom_histogram</tspan><tspan fill="#abb2bf">()</tspan></text>
  <text x="678" y="356" font-family="'Courier New',monospace" font-size="9.5" fill="#abb2bf">  \})</text>
  <text x="678" y="370" font-family="'Courier New',monospace" font-size="9.5" fill="#abb2bf">\}</text>
  <text x="678" y="388" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#c678dd">shinyApp</tspan><tspan fill="#abb2bf">(ui, server)</tspan></text>
  <!-- Deploy arrow -->
  <rect x="678" y="404" width="198" height="44" rx="6" fill="#2d3748"/>
