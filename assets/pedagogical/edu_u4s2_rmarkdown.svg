  <text x="450" y="44" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" fill="#99f6e4">Unidad 4.2 · Reportes ejecutivos · Dashboards interactivos · FACEN-UNA 2026</text>

