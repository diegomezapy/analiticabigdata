<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg31d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/><stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#bg31d)"/>
  <rect width="900" height="50" fill="#3b0764"/>
  <text x="450" y="29" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="white">Bias-Variance Tradeoff</text>
  <text x="450" y="44" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" fill="#d8b4fe">Unidad 3.1 · Sesgo · Varianza · Underfitting · Overfitting · Complejidad del modelo · FACEN-UNA 2026</text>

  <!-- LEFT: 4 bullseye targets in 2×2 grid -->
  <rect x="18" y="58" width="430" height="410" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>
  <text x="233" y="78" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="800" fill="#3b0764">Analogía del tiro al blanco</text>
  <text x="233" y="93" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" fill="#6b7280">Cada punto = una predicción del modelo. Centro = valor real.</text>

  <!-- Bullseye helper: concentric circles at (cx,cy) r=8,20,32,44 -->

  <!-- TARGET 1: Low Bias, Low Variance (IDEAL) — top-left cx=120, cy=175 -->
  <circle cx="120" cy="175" r="44" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <circle cx="120" cy="175" r="32" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <circle cx="120" cy="175" r="20" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <circle cx="120" cy="175" r="8"  fill="#16a34a" stroke="#15803d" stroke-width="1"/>
  <!-- Shots: clustered at center -->
  <circle cx="116" cy="172" r="4" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="123" cy="169" r="4" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="118" cy="178" r="4" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="124" cy="176" r="4" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="121" cy="171" r="4" fill="#1d4ed8" opacity="0.9"/>
  <text x="120" y="232" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#16a34a">Bajo Sesgo</text>
  <text x="120" y="246" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#16a34a">Baja Varianza</text>
  <rect x="68" y="252" width="104" height="16" rx="8" fill="#16a34a"/>
  <text x="120" y="263" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="700" fill="white">IDEAL ✓</text>

  <!-- TARGET 2: High Bias, Low Variance — top-right cx=340, cy=175 -->
  <circle cx="340" cy="175" r="44" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <circle cx="340" cy="175" r="32" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <circle cx="340" cy="175" r="20" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <circle cx="340" cy="175" r="8"  fill="#16a34a" stroke="#15803d" stroke-width="1"/>
  <!-- Shots: clustered but off-center (toward upper-right) -->
  <circle cx="356" cy="161" r="4" fill="#f97316" opacity="0.9"/>
  <circle cx="362" cy="157" r="4" fill="#f97316" opacity="0.9"/>
  <circle cx="358" cy="165" r="4" fill="#f97316" opacity="0.9"/>
  <circle cx="364" cy="163" r="4" fill="#f97316" opacity="0.9"/>
  <circle cx="360" cy="159" r="4" fill="#f97316" opacity="0.9"/>
  <text x="340" y="232" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#f97316">Alto Sesgo</text>
  <text x="340" y="246" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#16a34a">Baja Varianza</text>
  <rect x="294" y="252" width="92" height="16" rx="8" fill="#f97316"/>
  <text x="340" y="263" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="700" fill="white">Underfitting</text>

  <!-- TARGET 3: Low Bias, High Variance — bottom-left cx=120, cy=380 -->
  <circle cx="120" cy="380" r="44" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <circle cx="120" cy="380" r="32" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <circle cx="120" cy="380" r="20" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <circle cx="120" cy="380" r="8"  fill="#16a34a" stroke="#15803d" stroke-width="1"/>
  <!-- Shots: spread around center -->
  <circle cx="106" cy="368" r="4" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="138" cy="362" r="4" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="96"  cy="388" r="4" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="142" cy="394" r="4" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="125" cy="412" r="4" fill="#1d4ed8" opacity="0.9"/>
  <text x="120" y="437" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#16a34a">Bajo Sesgo</text>
  <text x="120" y="451" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#dc2626">Alta Varianza</text>
  <rect x="72" y="456" width="96" height="16" rx="8" fill="#dc2626"/>
  <text x="120" y="467" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="700" fill="white">Overfitting</text>

  <!-- TARGET 4: High Bias, High Variance — bottom-right cx=340, cy=380 -->
  <circle cx="340" cy="380" r="44" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <circle cx="340" cy="380" r="32" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <circle cx="340" cy="380" r="20" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <circle cx="340" cy="380" r="8"  fill="#16a34a" stroke="#15803d" stroke-width="1"/>
  <!-- Shots: spread and off-center -->
  <circle cx="360" cy="356" r="4" fill="#dc2626" opacity="0.9"/>
  <circle cx="375" cy="368" r="4" fill="#dc2626" opacity="0.9"/>
  <circle cx="350" cy="395" r="4" fill="#dc2626" opacity="0.9"/>
  <circle cx="370" cy="404" r="4" fill="#dc2626" opacity="0.9"/>
  <circle cx="378" cy="361" r="4" fill="#dc2626" opacity="0.9"/>
  <text x="340" y="437" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#f97316">Alto Sesgo</text>
  <text x="340" y="451" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#dc2626">Alta Varianza</text>
  <rect x="286" y="456" width="108" height="16" rx="8" fill="#7f1d1d"/>
  <text x="340" y="467" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="700" fill="white">Muy malo</text>

  <!-- RIGHT: Error curves + decomposition -->
  <rect x="462" y="58" width="424" height="410" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>
  <text x="674" y="78" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="800" fill="#3b0764">Error vs. Complejidad del Modelo</text>
  <text x="674" y="93" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" fill="#6b7280">Curvas de error en entrenamiento y prueba</text>

  <!-- Chart: x=480 to 870 y=105 to 340 -->
  <line x1="480" y1="100" x2="480" y2="342" stroke="#374151" stroke-width="1.5"/>
  <line x1="480" y1="342" x2="872" y2="342" stroke="#374151" stroke-width="1.5"/>
  <!-- Y axis label -->
  <text x="466" y="222" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9.5" fill="#6b7280" transform="rotate(-90,466,222)">Error</text>
  <!-- X axis label -->
  <text x="676" y="360" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" fill="#6b7280">Complejidad del modelo →</text>
  <!-- Gridlines -->
  <line x1="480" y1="180" x2="872" y2="180" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="480" y1="260" x2="872" y2="260" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Training error curve: monotonically decreasing -->
  <polyline points="490,295 530,270 570,248 610,232 650,220 690,213 730,208 770,206 810,205 850,204 865,204"
    fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Test error curve: U-shaped -->
  <polyline points="490,320 530,286 570,258 610,238 650,226 690,222 730,226 770,238 810,258 850,284 865,296"
    fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- AUC shading for test error (approximate U shape fill) -->

  <!-- Minimum test error at x=690, y=222 -->
  <circle cx="690" cy="222" r="6" fill="#7c3aed" stroke="white" stroke-width="2"/>
  <line x1="690" y1="222" x2="690" y2="342" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="690" y="354" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="700" fill="#7c3aed">Óptimo</text>

  <!-- Labels on curves -->
  <text x="856" y="200" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#3b82f6">Train</text>
  <text x="852" y="290" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#dc2626">Test</text>

  <!-- Region labels -->
  <text x="550" y="118" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9.5" font-weight="700" fill="#f97316">Underfitting</text>
  <text x="550" y="130" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9" fill="#6b7280">Alto sesgo</text>
  <text x="800" y="118" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9.5" font-weight="700" fill="#dc2626">Overfitting</text>
  <text x="800" y="130" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9" fill="#6b7280">Alta varianza</text>

  <!-- Vertical region markers -->
  <line x1="580" y1="104" x2="580" y2="342" stroke="#f3f4f6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="770" y1="104" x2="770" y2="342" stroke="#f3f4f6" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Decomposition box -->
  <rect x="470" y="368" width="408" height="70" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="674" y="384" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#3b0764">Descomposición del error total</text>
  <text x="674" y="400" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" fill="#374151">Error = Sesgo² + Varianza + Ruido irreducible</text>
  <text x="476" y="416" font-family="Inter,Arial,sans-serif" font-size="10" fill="#374151">• <tspan fill="#f97316" font-weight="700">Sesgo alto:</tspan> modelo muy simple, no captura el patrón (ej: regresión lineal en datos curvos)</text>
  <text x="476" y="430" font-family="Inter,Arial,sans-serif" font-size="10" fill="#374151">• <tspan fill="#dc2626" font-weight="700">Varianza alta:</tspan> modelo muy complejo, memoriza el ruido (ej: árbol sin poda, k=1 en KNN)</text>
</svg>
