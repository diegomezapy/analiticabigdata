<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg41" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/><stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#bg41)"/>
  <rect width="900" height="50" fill="#052e16"/>
  <text x="450" y="29" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="white">Importancia de Variables — SHAP Values</text>
  <text x="450" y="44" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" fill="#86efac">Unidad 4.1 · Shapley Additive Explanations · RFE · Maldición de dimensionalidad · FACEN-UNA 2026</text>

  <!-- === LEFT: SHAP Waterfall (single prediction explanation) === -->
  <rect x="18" y="58" width="430" height="410" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>
  <text x="233" y="78" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="800" fill="#052e16">Explicación SHAP — Predicción individual</text>
  <text x="233" y="93" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" fill="#6b7280">¿Por qué el modelo predijo "Alto riesgo" para este paciente?</text>

  <!-- Baseline annotation -->
  <text x="30" y="120" font-family="Inter,Arial,sans-serif" font-size="10.5" font-weight="600" fill="#374151">Valor base:</text>
  <text x="110" y="120" font-family="Inter,Arial,sans-serif" font-size="10.5" font-weight="700" fill="#6b7280">E[f(X)] = 0.32</text>
  <!-- Baseline bar position: x=190 = P=0.32 in scale -->

  <!-- Waterfall bars (y positions for 8 features) -->
  <!-- Scale: x from 80 (P=0) to 420 (P=1), center at x=190 (baseline P=0.32) -->
  <!-- x(P) = 80 + P*340; baseline x = 80+0.32*340 = 189 -->

  <!-- Feature bars (horizontal waterfall) -->
  <!-- Each feature shifts the prediction from baseline -->

  <!-- glucosa_alta: +0.28 → orange bar from x=189 to x=189+95=284 -->
  <rect x="182" y="130" width="96" height="26" rx="3" fill="#f97316"/>
  <text x="178" y="148" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">glucosa_alta</text>
  <text x="284" y="148" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#ea580c"> +0.28</text>

  <!-- edad_65: +0.18 → continue from 284 to 284+61=345 -->
  <rect x="278" y="164" width="62" height="26" rx="3" fill="#f97316"/>
  <text x="178" y="182" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">edad_mayor65</text>
  <text x="344" y="182" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#ea580c"> +0.18</text>

  <!-- IMC: +0.14 → 345 to 345+47=392 -->
  <rect x="340" y="198" width="48" height="26" rx="3" fill="#f97316"/>
  <text x="178" y="216" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">IMC_alto</text>
  <text x="392" y="216" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#ea580c"> +0.14</text>

  <!-- hipertension: +0.09 → 392 to 392+30=422 (capped at chart) -->
  <rect x="388" y="232" width="30" height="26" rx="3" fill="#f97316"/>
  <text x="178" y="250" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">hipertension</text>
  <text x="420" y="250" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#ea580c"> +0.09</text>

  <!-- sexo_M: -0.06 → 422 to 422-20=402 (shrinks) -->
  <rect x="398" y="266" width="20" height="26" rx="3" fill="#3b82f6"/>
  <text x="178" y="284" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">sexo_M</text>
  <text x="395" y="284" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#2563eb">−0.06</text>

  <!-- zona_rural: -0.05 → back more -->
  <rect x="378" y="300" width="18" height="26" rx="3" fill="#3b82f6"/>
  <text x="178" y="318" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">zona_rural</text>
  <text x="375" y="318" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#2563eb">−0.05</text>

  <!-- actividad_fisica: -0.08 → shrinks more -->
  <rect x="344" y="334" width="30" height="26" rx="3" fill="#3b82f6"/>
  <text x="178" y="352" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">actividad_física</text>
  <text x="341" y="352" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#2563eb">−0.08</text>

  <!-- ingreso_alto: -0.04 -->
  <rect x="326" y="368" width="14" height="26" rx="3" fill="#3b82f6"/>
  <text x="178" y="386" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">ingreso_alto</text>
  <text x="323" y="386" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#2563eb">−0.04</text>

  <!-- Final prediction line -->
  <line x1="316" y1="404" x2="316" y2="120" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Baseline vertical line -->
  <line x1="182" y1="404" x2="182" y2="120" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom axis -->
  <line x1="80" y1="404" x2="430" y2="404" stroke="#374151" stroke-width="1.5"/>
  <text x="80" y="420" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9" fill="#374151">0</text>
  <text x="182" y="420" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9" fill="#6b7280">0.32</text>
  <text x="316" y="420" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9.5" font-weight="700" fill="#dc2626">0.87</text>
  <text x="430" y="420" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9" fill="#374151">1</text>
  <text x="182" y="432" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9.5" fill="#6b7280">E[f(X)]</text>
  <text x="316" y="432" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9.5" font-weight="700" fill="#dc2626">f(x) = 0.87</text>

  <!-- Prediction summary -->
  <rect x="28" y="440" width="410" height="22" rx="4" fill="#fee2e2"/>
  <text x="233" y="455" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#dc2626">→ Predicción: ALTO RIESGO (0.87). Principales factores: glucosa alta, edad, IMC.</text>

  <!-- === RIGHT: Global feature importance bar chart === -->
  <rect x="462" y="58" width="424" height="410" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>
  <text x="674" y="78" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="800" fill="#052e16">Importancia Global de Variables</text>
  <text x="674" y="93" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" fill="#6b7280">|SHAP| promedio en todo el conjunto de datos</text>

  <!-- Horizontal bars for global importance -->
  <!-- Feature bars from top to bottom, sorted descending -->
  <!-- glucosa_alta: 0.31 -->
  <rect x="600" y="108" width="215" height="22" rx="3" fill="#f97316"/>
  <rect x="600" y="108" width="215" height="22" rx="3" fill="url(#shapimp)" opacity="0.8"/>
  <text x="596" y="123" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">glucosa_alta</text>
  <text x="818" y="123" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#ea580c">0.31</text>

  <!-- edad_mayor65: 0.24 -->
  <rect x="600" y="138" width="166" height="22" rx="3" fill="#f97316" opacity="0.9"/>
  <text x="596" y="153" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">edad_mayor65</text>
  <text x="769" y="153" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#ea580c">0.24</text>

  <!-- IMC_alto: 0.19 -->
  <rect x="600" y="168" width="131" height="22" rx="3" fill="#f59e0b" opacity="0.9"/>
  <text x="596" y="183" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">IMC_alto</text>
  <text x="734" y="183" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#d97706">0.19</text>

  <!-- hipertension: 0.16 -->
  <rect x="600" y="198" width="111" height="22" rx="3" fill="#f59e0b" opacity="0.85"/>
  <text x="596" y="213" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">hipertension</text>
  <text x="714" y="213" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#d97706">0.16</text>

  <!-- actividad_fisica: 0.11 -->
  <rect x="600" y="228" width="76" height="22" rx="3" fill="#22c55e" opacity="0.85"/>
  <text x="596" y="243" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">actividad_física</text>
  <text x="679" y="243" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#16a34a">0.11</text>

  <!-- antecedentes: 0.09 -->
  <rect x="600" y="258" width="62" height="22" rx="3" fill="#22c55e" opacity="0.8"/>
  <text x="596" y="273" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">antecedentes</text>
  <text x="665" y="273" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#16a34a">0.09</text>

  <!-- sexo: 0.06 -->
  <rect x="600" y="288" width="41" height="22" rx="3" fill="#3b82f6" opacity="0.75"/>
  <text x="596" y="303" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">sexo</text>
  <text x="644" y="303" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#2563eb">0.06</text>

  <!-- ingreso: 0.04 -->
  <rect x="600" y="318" width="28" height="22" rx="3" fill="#3b82f6" opacity="0.65"/>
  <text x="596" y="333" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">ingreso</text>
  <text x="631" y="333" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#2563eb">0.04</text>

  <!-- zona: 0.03 -->
  <rect x="600" y="348" width="21" height="22" rx="3" fill="#94a3b8" opacity="0.65"/>
  <text x="596" y="363" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">zona</text>
  <text x="624" y="363" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#6b7280">0.03</text>

  <!-- Axis -->
  <line x1="598" y1="108" x2="598" y2="380" stroke="#374151" stroke-width="1.5"/>
  <line x1="598" y1="380" x2="830" y2="380" stroke="#374151" stroke-width="1.5"/>
  <text x="714" y="396" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" fill="#6b7280">|SHAP| promedio (impacto en predicción)</text>

  <!-- Explanation box -->
  <rect x="468" y="408" width="412" height="52" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="674" y="424" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#052e16">¿Qué son los SHAP values?</text>
  <text x="474" y="440" font-family="Inter,Arial,sans-serif" font-size="10.5" fill="#374151">Cada feature recibe un valor Shapley: contribución marginal promedio sobre todas las permutaciones</text>
  <text x="474" y="454" font-family="Inter,Arial,sans-serif" font-size="10" fill="#6b7280">R: library(shapviz)  |  Python: import shap;  shap.summary_plot(shap_values, X)</text>
</svg>
