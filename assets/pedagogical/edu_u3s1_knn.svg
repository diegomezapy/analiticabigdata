<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg31" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/><stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <!-- Dashed circle for K neighbors -->
    <filter id="shadow31">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#7c3aed" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="900" height="500" fill="url(#bg31)"/>
  <rect width="900" height="50" fill="#3b0764"/>
  <text x="450" y="29" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="white">K-Nearest Neighbors (KNN) — Clasificación</text>
  <text x="450" y="44" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" fill="#d8b4fe">Unidad 3.1 · Algoritmo de clasificación por similitud · FACEN-UNA 2026</text>

  <!-- Scatter plot area -->
  <rect x="18" y="60" width="520" height="380" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>

  <!-- Decision boundary (soft) -->
  <path d="M 120,60 C 200,180 240,250 280,440" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.6"/>
  <!-- Region fills -->
  <rect x="18" y="60" width="260" height="380" fill="#eff6ff" opacity="0.4" rx="8 0 0 8"/>
  <rect x="278" y="60" width="260" height="380" fill="#fef3c7" opacity="0.4" rx="0 8 8 0"/>

  <!-- Class A: blue circles (left region mostly) -->
  <circle cx="70" cy="160" r="6" fill="#3b82f6"/>
  <circle cx="95" cy="200" r="6" fill="#3b82f6"/>
  <circle cx="75" cy="240" r="6" fill="#3b82f6"/>
  <circle cx="110" cy="280" r="6" fill="#3b82f6"/>
  <circle cx="85" cy="320" r="6" fill="#3b82f6"/>
  <circle cx="130" cy="155" r="6" fill="#3b82f6"/>
  <circle cx="155" cy="190" r="6" fill="#3b82f6"/>
  <circle cx="145" cy="250" r="6" fill="#3b82f6"/>
  <circle cx="170" cy="300" r="6" fill="#3b82f6"/>
  <circle cx="190" cy="360" r="6" fill="#3b82f6"/>
  <circle cx="200" cy="130" r="6" fill="#3b82f6"/>
  <circle cx="220" cy="165" r="6" fill="#3b82f6"/>
  <circle cx="210" cy="220" r="6" fill="#3b82f6"/>
  <!-- One blue in orange zone (noise) -->
  <circle cx="320" cy="340" r="6" fill="#3b82f6"/>

  <!-- Class B: orange triangles (right region mostly) -->
  <polygon points="335,90 343,106 327,106" fill="#f97316"/>
  <polygon points="380,130 388,146 372,146" fill="#f97316"/>
  <polygon points="360,175 368,191 352,191" fill="#f97316"/>
  <polygon points="410,160 418,176 402,176" fill="#f97316"/>
  <polygon points="395,210 403,226 387,226" fill="#f97316"/>
  <polygon points="430,240 438,256 422,256" fill="#f97316"/>
  <polygon points="460,190 468,206 452,206" fill="#f97316"/>
  <polygon points="480,280 488,296 472,296" fill="#f97316"/>
  <polygon points="450,310 458,326 442,326" fill="#f97316"/>
  <polygon points="490,340 498,356 482,356" fill="#f97316"/>
  <polygon points="360,270 368,286 352,286" fill="#f97316"/>
  <polygon points="415,290 423,306 407,306" fill="#f97316"/>
  <!-- One orange in blue zone (noise) -->
  <polygon points="175,400 183,416 167,416" fill="#f97316"/>

  <!-- Query point (star ★) -->
  <text x="272" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" fill="#dc2626" filter="url(#shadow31)">★</text>
  <text x="272" y="258" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9.5" font-weight="700" fill="#dc2626">punto nuevo</text>

  <!-- K=5 radius circle -->
  <circle cx="272" cy="232" r="88" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="8,4" opacity="0.9"/>
  <!-- Distance lines to 5 nearest neighbors -->
  <line x1="272" y1="232" x2="210" y2="220" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,2" opacity="0.7"/>
  <line x1="272" y1="232" x2="220" y2="165" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,2" opacity="0.7"/>
  <line x1="272" y1="232" x2="360" y2="175" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,2" opacity="0.7"/>
  <line x1="272" y1="232" x2="360" y2="270" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,2" opacity="0.7"/>
  <line x1="272" y1="232" x2="245" y2="250" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,2" opacity="0.7"/>
  <!-- Highlighted neighbors -->
  <circle cx="210" cy="220" r="10" fill="none" stroke="#7c3aed" stroke-width="2.5"/>
  <circle cx="220" cy="165" r="10" fill="none" stroke="#7c3aed" stroke-width="2.5"/>
  <circle cx="360" cy="175" r="10" fill="none" stroke="#7c3aed" stroke-width="2.5"/>
  <circle cx="360" cy="270" r="10" fill="none" stroke="#7c3aed" stroke-width="2.5"/>
  <!-- 5th closest (blue) -->
  <circle cx="145" cy="250" r="10" fill="none" stroke="#7c3aed" stroke-width="2.5"/>
  <line x1="272" y1="232" x2="145" y2="250" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,2" opacity="0.7"/>

  <!-- Axis labels -->
  <text x="278" y="450" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" fill="#6b7280">Variable X₁ (ej. edad)</text>
  <text x="26" y="252" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" fill="#6b7280" transform="rotate(-90,26,252)">Variable X₂ (ej. glucosa)</text>

  <!-- Legend (lower left of chart) -->
  <circle cx="40" cy="405" r="6" fill="#3b82f6"/>
  <text x="52" y="410" font-family="Inter,Arial,sans-serif" font-size="11" fill="#374151">Clase A (3/5 vecinos)</text>
  <polygon points="40,423 47,436 33,436" fill="#f97316"/>
  <text x="52" y="433" font-family="Inter,Arial,sans-serif" font-size="11" fill="#374151">Clase B (2/5 vecinos)</text>
  <text x="26" y="455" font-family="'Courier New',monospace" font-size="9.5" fill="#7c3aed">K=5 →</text>
  <text x="52" y="455" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#7c3aed">Predice: Clase A</text>

  <!-- Right panel: explanation -->
  <rect x="552" y="60" width="330" height="380" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>
  <text x="717" y="82" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#3b0764">Cómo funciona KNN</text>

  <!-- Steps -->
  <rect x="568" y="92" width="298" height="34" rx="6" fill="#ede9fe"/>
  <text x="717" y="107" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#5b21b6">① Elegir K (número de vecinos)</text>
  <text x="717" y="120" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" fill="#6b7280">Hiperparámetro: K=1, 3, 5, 7…</text>

  <rect x="568" y="134" width="298" height="34" rx="6" fill="#dbeafe"/>
  <text x="717" y="149" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#1e40af">② Calcular distancia al nuevo punto</text>
  <text x="717" y="162" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" fill="#6b7280">Euclidiana: d = √(Δx² + Δy²)</text>

  <rect x="568" y="176" width="298" height="34" rx="6" fill="#d1fae5"/>
  <text x="717" y="191" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#065f46">③ Seleccionar los K más cercanos</text>
  <text x="717" y="204" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" fill="#6b7280">Dentro del radio de búsqueda</text>

  <rect x="568" y="218" width="298" height="34" rx="6" fill="#fde68a"/>
  <text x="717" y="233" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#92400e">④ Votar por mayoría (clasificación)</text>
  <text x="717" y="246" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" fill="#6b7280">O promedio (regresión)</text>

  <!-- K selection chart (small) -->
  <text x="717" y="276" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="700" fill="#374151">Selección óptima de K</text>
  <!-- Mini error curve -->
  <polyline points="580,360 600,308 620,285 640,272 660,268 680,270 700,276 720,286 740,300 760,318 780,340 800,365 820,395 840,428"
    fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Optimal K marker -->
  <circle cx="660" cy="268" r="6" fill="#dc2626"/>
  <line x1="660" y1="268" x2="660" y2="295" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="660" y="308" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#dc2626">K óptimo</text>
  <!-- Axis -->
  <line x1="578" y1="290" x2="578" y2="430" stroke="#9ca3af" stroke-width="1.2"/>
  <line x1="578" y1="430" x2="845" y2="430" stroke="#9ca3af" stroke-width="1.2"/>
  <text x="712" y="445" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9.5" fill="#6b7280">K (vecinos)</text>
  <text x="566" y="365" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9.5" fill="#6b7280" transform="rotate(-90,566,365)">Error</text>
  <!-- Overfitting / underfitting labels -->
  <text x="610" y="428" font-family="Inter,Arial,sans-serif" font-size="9" fill="#dc2626">Overfitting</text>
  <text x="770" y="428" font-family="Inter,Arial,sans-serif" font-size="9" fill="#d97706">Underfitting</text>

  <!-- Code snippet -->
  <rect x="552" y="448" width="330" height="46" fill="#1e1e2e" rx="6"/>
  <text x="566" y="462" font-family="'Courier New',monospace" font-size="10"><tspan fill="#6b7280"># R: </tspan><tspan fill="#c678dd">library</tspan><tspan fill="#abb2bf">(class)</tspan></text>
  <text x="566" y="476" font-family="'Courier New',monospace" font-size="10"><tspan fill="#c678dd">knn</tspan><tspan fill="#abb2bf">(train, test, cl, k=</tspan><tspan fill="#d19a66">5</tspan><tspan fill="#abb2bf">)</tspan></text>
  <text x="750" y="462" font-family="'Courier New',monospace" font-size="10"><tspan fill="#6b7280"># Python:</tspan></text>
  <text x="750" y="476" font-family="'Courier New',monospace" font-size="10"><tspan fill="#c678dd">KNeighborsClassifier</tspan><tspan fill="#abb2bf">(k)</tspan></text>
</svg>
