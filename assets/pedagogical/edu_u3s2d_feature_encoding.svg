  <rect x="148" y="120" width="96" height="24" fill="#3b0764"/>
  <text x="196" y="136" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="white">zona_cod</text>
  <rect x="148" y="144" width="96" height="22" fill="#ede9fe"/>
  <text x="196" y="158" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" fill="#6d28d9">2</text>
