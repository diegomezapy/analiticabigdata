  <text x="80" y="180" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" fill="#92400e">Rural</text>
  <rect x="44" y="188" width="72" height="22" fill="#fee2e2"/>
  <text x="80" y="202" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" fill="#991b1b">Indígena</text>
  <rect x="44" y="210" width="72" height="22" fill="#fef3c7"/>
  <text x="80" y="224" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" fill="#92400e">Rural</text>
  <rect x="44" y="232" width="72" height="22" fill="#dbeafe"/>
  <text x="80" y="246" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" fill="#1d4ed8">Urbano</text>

