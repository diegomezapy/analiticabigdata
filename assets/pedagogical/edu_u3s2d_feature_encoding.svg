<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg32d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/><stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#bg32d)"/>
  <rect width="900" height="50" fill="#3b0764"/>
  <text x="450" y="29" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="white">Feature Engineering — Encoding y Escalado</text>
  <text x="450" y="44" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" fill="#d8b4fe">Unidad 3.2 · One-hot encoding · Label encoding · Min-Max · Z-score · FACEN-UNA 2026</text>

  <!-- LEFT: Encoding categorical variables -->
  <rect x="18" y="58" width="430" height="410" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>
  <text x="233" y="78" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="800" fill="#3b0764">Encoding de Variables Categóricas</text>
  <text x="233" y="93" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" fill="#6b7280">Transformar texto → números para el modelo</text>

  <!-- Original data column -->
  <text x="80" y="115" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#374151">Original</text>
  <rect x="44" y="120" width="72" height="24" fill="#1e3a5f"/>
  <text x="80" y="136" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="white">zona</text>
  <!-- Data rows -->
