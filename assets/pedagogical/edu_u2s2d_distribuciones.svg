  <text x="20" y="458" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#6b7280"># R: </tspan><tspan fill="#c678dd">hist</tspan><tspan fill="#abb2bf">(x, breaks=20)  |  </tspan><tspan fill="#c678dd">density</tspan><tspan fill="#abb2bf">(x)  |  </tspan><tspan fill="#c678dd">skewness</tspan><tspan fill="#abb2bf">(x)  # library(e1071)</tspan></text>
  <text x="20" y="474" font-family="'Courier New',monospace" font-size="9.5"><tspan fill="#6b7280"># Python: </tspan><tspan fill="#c678dd">plt.hist</tspan><tspan fill="#abb2bf">(x, bins=20)  |  </tspan><tspan fill="#c678dd">scipy.stats.skew</tspan><tspan fill="#abb2bf">(x)  |  </tspan><tspan fill="#c678dd">sns.histplot</tspan><tspan fill="#abb2bf">(x, kde=True)</tspan></text>
