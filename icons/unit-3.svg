<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- U3: Machine Learning / neural network -->
  <!-- Connections (draw first, behind nodes) -->
  <line x1="5.5" y1="7"  x2="10" y2="5"  stroke="white" stroke-width="1" opacity="0.45"/>
  <line x1="5.5" y1="7"  x2="10" y2="12" stroke="white" stroke-width="1" opacity="0.45"/>
  <line x1="5.5" y1="7"  x2="10" y2="19" stroke="white" stroke-width="1" opacity="0.35"/>
  <line x1="5.5" y1="17" x2="10" y2="5"  stroke="white" stroke-width="1" opacity="0.35"/>
  <line x1="5.5" y1="17" x2="10" y2="12" stroke="white" stroke-width="1" opacity="0.45"/>
  <line x1="5.5" y1="17" x2="10" y2="19" stroke="white" stroke-width="1" opacity="0.45"/>
  <line x1="12.5" y1="5"  x2="17" y2="12" stroke="white" stroke-width="1" opacity="0.45"/>
  <line x1="12.5" y1="12" x2="17" y2="12" stroke="white" stroke-width="1.5" opacity="0.65"/>
  <line x1="12.5" y1="19" x2="17" y2="12" stroke="white" stroke-width="1" opacity="0.45"/>
  <!-- Input layer nodes -->
  <circle cx="5.5" cy="7"  r="2.5" fill="white" opacity="0.9"/>
  <circle cx="5.5" cy="17" r="2.5" fill="white" opacity="0.9"/>
  <!-- Hidden layer nodes -->
  <circle cx="12" cy="5"  r="2.5" fill="white" opacity="0.85"/>
  <circle cx="12" cy="12" r="2.5" fill="white"/>
  <circle cx="12" cy="19" r="2.5" fill="white" opacity="0.85"/>
  <!-- Output node -->
  <circle cx="19" cy="12" r="2.5" fill="white" opacity="0.9"/>
</svg>
