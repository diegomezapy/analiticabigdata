<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- U2: Visualization / bar chart with trend line -->
  <!-- Bars -->
  <rect x="2"  y="14" width="4" height="7" rx="1" fill="white" fill-opacity="0.85"/>
  <rect x="8"  y="9"  width="4" height="12" rx="1" fill="white" fill-opacity="0.85"/>
  <rect x="14" y="5"  width="4" height="16" rx="1" fill="white" fill-opacity="0.85"/>
  <!-- Axis line -->
  <line x1="1" y1="21" x2="22" y2="21" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Trend line (orange-like, but white with opacity) -->
  <polyline points="4,13 10,8 16,5 20,3" fill="none" stroke="white" stroke-width="1.8"
    stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2,1" opacity="0.6"/>
  <!-- Trend dot -->
  <circle cx="20" cy="3" r="1.5" fill="white" opacity="0.8"/>
</svg>
