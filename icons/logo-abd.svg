<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1628"/>
      <stop offset="100%" stop-color="#1a2d4a"/>
    </linearGradient>
    <linearGradient id="barA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="barB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Decorative background accent circles -->
  <circle cx="430" cy="80" r="130" fill="#0ea5e9" opacity="0.06"/>
  <circle cx="80"  cy="380" r="110" fill="#14b8a6" opacity="0.07"/>

  <!-- Grid lines -->
  <line x1="66" y1="310" x2="446" y2="310" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="66" y1="250" x2="446" y2="250" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="66" y1="190" x2="446" y2="190" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="66" y1="130" x2="446" y2="130" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Bars (from axis line y=315 upward) -->
  <rect x="72"  y="271" width="50" height="44"  rx="6" fill="url(#barA)" opacity="0.78"/>
  <rect x="142" y="207" width="50" height="108" rx="6" fill="url(#barA)" opacity="0.85"/>
  <rect x="212" y="221" width="50" height="94"  rx="6" fill="url(#barB)" opacity="0.90"/>
  <rect x="282" y="157" width="50" height="158" rx="6" fill="url(#barB)" opacity="0.95"/>
  <rect x="352" y="177" width="50" height="138" rx="6" fill="url(#barB)"/>
  <rect x="422" y="127" width="50" height="188" rx="6" fill="#38bdf8"/>

  <!-- Axis line -->
  <line x1="66" y1="316" x2="480" y2="316" stroke="#334155" stroke-width="2.5"/>

  <!-- Trend line (orange, filtered for glow effect) -->
  <polyline filter="url(#glow)"
    points="97,255 167,210 237,214 307,172 377,178 447,142"
    fill="none" stroke="#f97316" stroke-width="5.5"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Trend data points -->
  <circle cx="97"  cy="255" r="9" fill="#f97316" stroke="#0c1628" stroke-width="2.5"/>
  <circle cx="167" cy="210" r="9" fill="#f97316" stroke="#0c1628" stroke-width="2.5"/>
  <circle cx="237" cy="214" r="9" fill="#f97316" stroke="#0c1628" stroke-width="2.5"/>
  <circle cx="307" cy="172" r="9" fill="#f97316" stroke="#0c1628" stroke-width="2.5"/>
  <circle cx="377" cy="178" r="9" fill="#f97316" stroke="#0c1628" stroke-width="2.5"/>
  <circle cx="447" cy="142" r="9" fill="#facc15" stroke="#0c1628" stroke-width="2.5"/>

  <!-- Neural network cluster (top-left, subtle) -->
  <circle cx="102" cy="84"  r="10" fill="#a78bfa" opacity="0.75"/>
  <circle cx="140" cy="58"  r="7"  fill="#c4b5fd" opacity="0.55"/>
  <circle cx="144" cy="110" r="8"  fill="#818cf8" opacity="0.65"/>
  <circle cx="68"  cy="110" r="6"  fill="#c4b5fd" opacity="0.45"/>
  <line x1="102" y1="84"  x2="140" y2="58"  stroke="#a78bfa" stroke-width="1.5" opacity="0.45"/>
  <line x1="102" y1="84"  x2="144" y2="110" stroke="#a78bfa" stroke-width="1.5" opacity="0.45"/>
  <line x1="102" y1="84"  x2="68"  y2="110" stroke="#a78bfa" stroke-width="1.5" opacity="0.35"/>
  <line x1="140" y1="58"  x2="144" y2="110" stroke="#a78bfa" stroke-width="1"   opacity="0.30"/>

  <!-- "ABD" label -->
  <text x="256" y="425"
    text-anchor="middle"
    font-family="'Inter', 'Arial Black', Arial, sans-serif"
    font-size="82" font-weight="800"
    fill="#f8fafc" letter-spacing="6">ABD</text>

  <!-- Thin separator line above text -->
  <line x1="140" y1="348" x2="372" y2="348" stroke="#334155" stroke-width="1.5" opacity="0.7"/>

  <!-- Small FACEN label -->
  <text x="256" y="474"
    text-anchor="middle"
    font-family="'Inter', Arial, sans-serif"
    font-size="22" font-weight="400"
    fill="#64748b" letter-spacing="3">FACEN · UNA</text>
</svg>
