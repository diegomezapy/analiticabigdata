<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- U4: Model Interpretation / magnifier with scatter insight -->
  <!-- Magnifier circle -->
  <circle cx="10.5" cy="10.5" r="6.5" stroke="white" stroke-width="1.8"/>
  <!-- Magnifier handle -->
  <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="white" stroke-width="2"
    stroke-linecap="round"/>
  <!-- Scatter dots inside magnifier -->
  <circle cx="8.5"  cy="12" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="10.5" cy="8.5" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="12.5" cy="11" r="1.2" fill="white" opacity="0.9"/>
  <!-- Trend arrow inside -->
  <polyline points="8,13 10,9 13,11" fill="none" stroke="white" stroke-width="1.4"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
</svg>
