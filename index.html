<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analítica de Big Data — FACEN | Login</title>
  <meta name="description" content="Plataforma educativa de Analítica de Big Data - FACEN. Inicia sesión para acceder a materiales, cuestionarios y actividades de aprendizaje.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <style>
    /* ===========================
       LOGIN PAGE SPECIFIC STYLES
       =========================== */
    body.login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(135deg, rgba(232,241,248,0.95), rgba(249,252,249,0.96) 48%, rgba(255,246,233,0.95)),
        var(--bg-dark);
      overflow: hidden;
      position: relative;
    }

    body.login-page::after {
      content: '';
      position: fixed;
      inset: 7%;
      border: 1px solid rgba(38,88,130,0.12);
      clip-path: polygon(0 0, 84% 0, 100% 18%, 100% 100%, 14% 100%, 0 84%);
      pointer-events: none;
      z-index: 0;
    }

    /* Animated particles canvas */
    #particles-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      display: none;
    }

    /* Background gradient rings */
    .bg-ring {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 8s ease-in-out infinite;
      z-index: 0;
      display: none;
    }
    .bg-ring-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, var(--primary), transparent);
      top: -200px; left: -200px;
      animation-delay: 0s;
    }
    .bg-ring-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, var(--accent), transparent);
      bottom: -150px; right: -150px;
      animation-delay: -4s;
    }
    .bg-ring-3 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, var(--tertiary), transparent);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -2s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Login Card */
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.78);
      border-radius: 18px;
      padding: 2.5rem;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: 5px;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--tertiary));
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo .logo-icon {
      width: 80px; height: 80px;
      border-radius: 14px;
      display: block;
      margin: 0 auto 1rem;
      box-shadow: var(--shadow-glow);
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 10px 30px rgba(20, 184, 166, 0.4); }
      50% { box-shadow: 0 10px 50px rgba(20, 184, 166, 0.7); }
    }

    .login-logo h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin: 0;
    }

    .login-logo p {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin: 0.3rem 0 0;
    }

    .login-form .form-group {
      margin-bottom: 1.2rem;
    }

    .login-form label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      color: var(--text-muted);
      transition: color 0.3s;
      pointer-events: none;
    }

    .login-form input {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 3rem;
      background: rgba(255,255,255,0.78);
      border: 1.5px solid rgba(38,88,130,0.14);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: all 0.3s;
      outline: none;
      box-sizing: border-box;
    }

    .login-form input:focus {
      border-color: var(--primary);
      background: rgba(20, 184, 166, 0.08);
      box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.15);
    }

    .login-form input:focus + .input-icon,
    .input-wrapper:focus-within .input-icon {
      color: var(--primary-light);
    }

    .btn-login {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      margin-top: 0.5rem;
      letter-spacing: 0.02em;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s;
    }

    .btn-login:hover::before { left: 100%; }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .btn-login:active { transform: translateY(0); }

    .login-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      color: #fca5a5;
      font-size: 0.85rem;
      margin-top: 1rem;
      display: none;
      animation: shake 0.4s ease;
    }

    .login-error.show { display: block; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .login-footer span {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
    }

    .loading-spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Feature badges */
    .feature-badges {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 1.5rem;
    }

    .badge-feat {
      align-items: center;
      display: inline-flex;
      gap: 0.35rem;
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-muted);
    }

    .badge-feat img {
      background: var(--primary);
      border-radius: 5px;
      height: 18px;
      padding: 0.2rem;
      width: 18px;
    }
  </style>
</head>
<body class="login-page">
  <canvas id="particles-canvas"></canvas>
  <div class="bg-ring bg-ring-1"></div>
  <div class="bg-ring bg-ring-2"></div>
  <div class="bg-ring bg-ring-3"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <img src="icons/logo-abd.svg" alt="Analítica de Big Data" class="logo-icon">
        <h1>Analítica de Big Data</h1>
        <p>FACEN — Matemática Estadística · 2026</p>
      </div>

      <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Cédula o usuario</label>
          <div class="input-wrapper">
            <input type="text" id="username" placeholder="Tu número de cédula" autocomplete="username" inputmode="numeric" required>
            <span class="input-icon">👤</span>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password" required>
            <span class="input-icon">🔑</span>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          <span id="btnText">Ingresar a la Plataforma →</span>
          <div class="loading-spinner" id="loginSpinner"></div>
        </button>

        <div class="login-error" id="loginError">
          Usuario no autorizado o contraseña incorrecta. Verifica que tu cédula ya haya sido cargada por el profesor.
        </div>
      </form>

      <div class="feature-badges">
        <span class="badge-feat"><img src="icons/logo-abd.svg" alt=""> 4 Unidades</span>
        <span class="badge-feat"><img src="icons/unit-1.svg" alt=""> Cuestionarios</span>
        <span class="badge-feat"><img src="icons/unit-3.svg" alt=""> Machine Learning</span>
        <span class="badge-feat"><img src="icons/unit-2.svg" alt=""> Seguimiento</span>
      </div>

      <div class="login-footer">
        <span>🔒 Primer acceso: cédula como usuario y contraseña</span>
      </div>
    </div>
  </div>

  <script>
    // ========================================
    // Particles animation
    // ========================================
    (function() {
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');
      let particles = [];
      let W, H;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function createParticle() {
        return {
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 2 + 0.5,
          dx: (Math.random() - 0.5) * 0.5,
          dy: -Math.random() * 0.8 - 0.2,
          alpha: Math.random() * 0.5 + 0.1,
          color: Math.random() > 0.5 ? '20,184,166' : '249,115,22'
        };
      }

      function init() {
        resize();
        for (let i = 0; i < 80; i++) particles.push(createParticle());
      }

      function animate() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach((p, i) => {
          p.x += p.dx; p.y += p.dy;
          p.alpha -= 0.001;
          if (p.y < -10 || p.alpha <= 0) particles[i] = createParticle();
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${p.color}, ${p.alpha})`;
          ctx.fill();
        });
        requestAnimationFrame(animate);
      }

      window.addEventListener('resize', resize);
      init();
      animate();
    })();

    // ========================================
    // Login logic
    // ========================================
    const SHEETS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwb5nz0SvccSfbz8QbfT299YsG10nyLRzfs5d0vcL-LmdTCZvy3H-o2-zGfhZvUr8B3/exec';

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function localUsers() {
      return JSON.parse(localStorage.getItem('abd_local_users') || '[]');
    }

    function saveLocalUsers(users) {
      localStorage.setItem('abd_local_users', JSON.stringify(users));
    }

    function isCedula(value) {
      return /^\d{5,12}$/.test(value);
    }

    async function loadStaticUsers() {
      try {
        const response = await fetch('data/usuarios.json');
        const data = await response.json();
        return data.usuarios || [];
      } catch (err) {
        return [
          {
            username: 'user',
            password_hash: await sha256('123'),
            nombre: 'Estudiante',
            rol: 'estudiante',
            password_changed: true
          },
          {
            username: 'profesor',
            password_hash: await sha256('profesor2026'),
            nombre: 'Profesor Diego Meza',
            rol: 'profesor',
            password_changed: true
          }
        ];
      }
    }

    function completeLogin(user) {
      sessionStorage.setItem('abd_user', JSON.stringify({
        username: user.username,
        cedula: user.cedula || user.username,
        nombre: user.nombre || user.username,
        rol: user.rol || 'estudiante',
        email: user.email || '',
        passwordChanged: user.password_changed !== false,
        loginTime: new Date().toISOString()
      }));
      document.querySelector('.login-card').style.transform = 'scale(1.05)';
      document.querySelector('.login-card').style.opacity = '0';
      document.querySelector('.login-card').style.transition = 'all 0.3s ease';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 300);
    }

    function jsonp(url, timeoutMs = 8000) {
      return new Promise((resolve) => {
        const callbackName = `abd_jsonp_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement('script');
        const sep = url.includes('?') ? '&' : '?';
        const timer = setTimeout(() => cleanup(null), timeoutMs);
        function cleanup(value) {
          clearTimeout(timer);
          delete window[callbackName];
          script.remove();
          resolve(value);
        }
        window[callbackName] = data => cleanup(data);
        script.onerror = () => cleanup(null);
        script.src = `${url}${sep}callback=${callbackName}`;
        document.body.appendChild(script);
      });
    }

    async function authenticateWithWebRoster(username, passwordHash) {
      if (!SHEETS_WEB_APP_URL || !isCedula(username)) return null;
      const params = new URLSearchParams({
        action: 'auth',
        username,
        password_hash: passwordHash
      });
      const result = await jsonp(`${SHEETS_WEB_APP_URL}?${params.toString()}`);
      return result && result.status === 'ok' ? result.user : null;
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('loginSpinner');
      const errorDiv = document.getElementById('loginError');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      // Show loading
      btnText.style.display = 'none';
      spinner.style.display = 'block';
      btn.disabled = true;
      errorDiv.classList.remove('show');

      try {
        const passwordHash = await sha256(password);
        const users = [...localUsers(), ...(await loadStaticUsers())];
        let user = users.find(u =>
          u.username === username && u.password_hash === passwordHash
        );

        if (!user) {
          user = await authenticateWithWebRoster(username, passwordHash);
        }

        if (user) {
          completeLogin(user);
        } else {
          errorDiv.classList.add('show');
          btnText.style.display = 'block';
          spinner.style.display = 'none';
          btn.disabled = false;
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch (err) {
        errorDiv.classList.add('show');
        btnText.style.display = 'block';
        spinner.style.display = 'none';
        btn.disabled = false;
      }
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // Check if already logged in
    if (sessionStorage.getItem('abd_user')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
